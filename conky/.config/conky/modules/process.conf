modules  $ cat process.conf          
conky.config = {
    own_window = true,
    own_window_type = 'dock',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_transparent = true,
alignment = 'middle_middle',
background = true,
double_buffer = true,
update_interval = 1,
own_window = true,
own_window_type = 'desktop',
own_window_transparent = true,
own_window_argb_visual = true,
own_window_argb_value = 150,
};


    out_to_x = false,
    out_to_wayland = true,
    double_buffer = true,
    update_interval = 2,

    minimum_width = 1200,
    maximum_width = 1200,
    minimum_height = 160,
    alignment = 'bottom_middle',   -- center bottom
    gap_x = 0,
    gap_y = 30,

    use_xft = true,
    font = 'Fira Code:size=11',
    default_color = '#2fffff',

    draw_borders = true,
    border_width = 2,
    border_inner_margin = 12,

    background = false,
};

conky.text = [[
${alignc}Top CPU Processes
${hr 2}
${top name 1} ${top cpu 1}%
${top name 2} ${top cpu 2}%
${top name 3} ${top cpu 3}%
${top name 4} ${top cpu 4}%
${top name 5} ${top cpu 5}%

${alignc}Top Memory Processes
${hr 2}
${top_mem name 1} ${top_mem mem 1}%
${top_mem name 2} ${top_mem mem 2}%
${top_mem name 3} ${top_mem mem 3}%
${top_mem name 4} ${top_mem mem 4}%
${top_mem name 5} ${top_mem mem 5}%
]];
