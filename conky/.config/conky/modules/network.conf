conky.config = {
    own_window = true,
    own_window_type = 'dock',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_transparent = true,

    out_to_x = false,
    out_to_wayland = true,
    double_buffer = true,
    update_interval = 1,

    minimum_width = 250,
    maximum_width = 250,
    minimum_height = 50,   -- compact
    alignment = 'top_right',
    gap_x = 30,
    gap_y = 680,           -- BELOW memory (adjust slightly)

    use_xft = true,
    font = 'Fira Code:size=11',
    default_color = '#2fffff',

    draw_borders = true,
    border_width = 2,
    border_inner_margin = 12,

    background = false,
};

conky.text = [[
${alignc}${font Fira Code:size=10}NET$font
${voffset -50}
${font Fira Code:size=11}
↓ ${downspeedf enp2s0} KB/s ${alignr}↑ ${upspeedf enp2s0} KB/s

${downspeedgraph enp2s0 20,240}
${upspeedgraph enp2s0 20,240}
${voffset -50}
$font
]];
