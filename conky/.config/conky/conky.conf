conky.config = {
    -- ==============================================
    -- Wayland / XWayland specific settings
    -- ==============================================
    own_window = true,
    own_window_type = 'dock',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_argb_visual = true,
    own_window_argb_value = 0,

	out_to_x = false,
	out_to_wayland = true,
    -- ==============================================
    -- Appearance and Positioning
    -- ==============================================
    double_buffer = true,
    update_interval = 1.5,
    total_run_times = 0,

    minimum_width = 260, minimum_height = 200,
    maximum_width = 260,
    alignment = 'top_right',
    gap_x = 30,
    gap_y = 40,

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = true,

    -- ==============================================
    -- Text and Color Settings
    -- ==============================================
    use_xft = true,
    font = 'Ubuntu Mono:size=11',
    xftalpha = 1.0,

    default_color = 'white',
    color1 = 'lightblue',
    color2 = 'lightgreen',
    color3 = 'orange',

    -- ==============================================
    -- Background and Transparency (XWayland)
    -- ==============================================
    background = true,
    own_window_transparent = true,

    -- ==============================================
    -- Advanced Options for Customization
    -- ==============================================
    lua_load = nil,
    imlib_cache_flush_interval = 250,
};

conky.text = [[
${color grey}Time:$color ${time %I:%M %p} ${color grey}Date:$color ${time %b %d}
${color grey}Kernel:$color $sysname $kernel
${color grey}Uptime:$color $uptime
${color grey}CPU Graph:$color $hr
${cpubar 8, 260}
${color grey}CPU: ${cpu}% ${cpugraph 20, 260}
${color grey}RAM Usage:$color $mem / $memmax ($memperc%) $membar
${color grey}Disk Usage (/) :$color ${fs_used /} / ${fs_size /} ${fs_bar /}
${color grey}Processes:$color $processes  ${color grey}Running:$color $running_processes
${color grey}Top CPU Users:$color
${top name 1}${goto 120}${top cpu 1}%
${top name 2}${goto 120}${top cpu 2}%
${top name 3}${goto 120}${top cpu 3}%
]];
